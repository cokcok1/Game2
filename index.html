<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <meta name="apple-mobile-web-app-title" content="福音麻雀">
    <meta name="application-name" content="福音麻雀">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#054a29">
    
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="https://cokcok1.github.io/Game1/mj.png">
    <link rel="icon" type="image/png" href="https://cokcok1.github.io/Game1/mj.png">

    <title>福音麻雀 - v40 雙語經典版</title>
    <style>
        :root { 
            --tile-w: 44px; 
            --tile-h: 58px; 
            --depth: 12px;
            /* v36 經典純深綠色背景 */
            --bg-color: #054a29;
            --ui-bg: #085e35;
            --text-dark: #fff;
            --btn-yellow-1: #ffd54f; --btn-yellow-2: #ffb300;
            --btn-blue-1: #4fc3f7; --btn-blue-2: #0288d1;
            --btn-orange-1: #ffab91; --btn-orange-2: #d84315;
            /* 麻雀側面顏色 - 實心綠背 */
            --tile-side-bottom: #0a3d22;
            --tile-side-right: #0e4f2d;
        }
        
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            margin: 0; 
            background-color: var(--bg-color);
            background-image: none;
            font-family: "Comic Sans MS", "Chalkboard SE", "幼圆", "Microsoft JhengHei", sans-serif;
            overflow: hidden; display: flex; flex-direction: column; height: 100vh; height: 100dvh; 
            color: var(--text-dark); user-select: none; -webkit-user-select: none; touch-action: none;
        }
        
        header, footer, .overlay-box, #joystick-zone, #status {
            backdrop-filter: none; -webkit-backdrop-filter: none;
            background: var(--ui-bg) !important;
            border: 2px solid rgba(0, 0, 0, 0.2);
            box-shadow: 0 4px 8px rgba(0,0,0,0.3);
        }

        header {
            flex-shrink: 0; height: calc(50px + env(safe-area-inset-top)); 
            padding: 5px 15px; padding-top: calc(5px + env(safe-area-inset-top)); 
            display: flex; justify-content: space-between; align-items: center; z-index: 100; font-size: 15px;
            border-bottom-left-radius: 20px; border-bottom-right-radius: 20px; margin: 0 10px 5px 10px;
        }

        .header-left {
            display: flex; align-items: center; gap: 8px;
        }

        #lang-btn {
            padding: 5px 10px; font-size: 14px; font-weight: bold; border-radius: 12px;
            background: linear-gradient(to bottom, #eeeeee, #cccccc);
            border: 2px solid #333; color: #333; cursor: pointer;
            box-shadow: 0 2px 0 #999; transition: all 0.1s;
        }
        #lang-btn:active { transform: translateY(2px); box-shadow: 0 0 0 #999; }

        select { 
            padding: 6px 10px; font-size: 14px; border-radius: 15px; 
            border: 2px solid rgba(0,0,0,0.3); background: #043a20 !important;
            max-width: 140px; color: #fff; font-weight: bold; box-shadow: inset 0 2px 5px rgba(0,0,0,0.5);
        }
        option { background: #333; color: #fff; }
        
        #status { font-size: 15px; font-weight: bold; background: rgba(255, 213, 79, 1) !important; color: #5d4037; padding: 6px 15px; border-radius: 20px; box-shadow: 0 3px 0 #ffca28, 0 5px 10px rgba(0,0,0,0.3); border: none; }
        
        #game-viewport {
            flex: 1; width: 100%; position: relative; overflow: hidden; padding: 0;
            perspective: 2000px; perspective-origin: center center;
        }

        #game-board { 
            position: absolute; top: 50%; left: 50%; 
            transform: translate(-50%, -50%) rotateX(30deg) rotateZ(0deg); 
            transform-origin: center center; transform-style: preserve-3d;
        }

        footer { 
            flex-shrink: 0; height: calc(80px + env(safe-area-inset-bottom)); 
            padding: 5px 10px; padding-bottom: max(5px, env(safe-area-inset-bottom));
            display: flex; justify-content: space-between; align-items: center; z-index: 100;
            border-top-left-radius: 25px; border-top-right-radius: 25px; margin: 5px 10px 0 10px;
        }

        .footer-btns { display: flex; flex: 1; justify-content: space-around; margin-right: 10px; }
        
        .btn {
            background: linear-gradient(to bottom, var(--btn-yellow-1), var(--btn-yellow-2)); 
            border: 2px solid #fff; padding: 0; width: auto; flex: 1; margin: 0 3px;
            height: 44px; border-radius: 25px; font-weight: bold; font-size: 16px; 
            box-shadow: 0 4px 0 #e65100, 0 6px 10px rgba(0,0,0,0.4); 
            cursor: pointer; display: flex; justify-content: center; align-items: center; color: #3e2723;
            transition: all 0.1s; text-shadow: none;
        }
        .btn:active { transform: translateY(3px); box-shadow: 0 1px 0 #e65100, 0 2px 5px rgba(0,0,0,0.4); }
        
        .btn-blue { 
            background: linear-gradient(to bottom, var(--btn-blue-1), var(--btn-blue-2)); 
            box-shadow: 0 4px 0 #01579b, 0 6px 10px rgba(0,0,0,0.4); color: white; border-color: #e1f5fe;
        }
        .btn-blue:active { transform: translateY(3px); box-shadow: 0 1px 0 #01579b, 0 2px 5px rgba(0,0,0,0.4); }

        .btn-orange {
            background: linear-gradient(to bottom, #ffcc80, #ff9800);
            box-shadow: 0 4px 0 #bf360c, 0 6px 10px rgba(0,0,0,0.4); color: #3e2723; border-color: #fff3e0;
        }
        .btn-orange:active { transform: translateY(3px); box-shadow: 0 1px 0 #bf360c, 0 2px 5px rgba(0,0,0,0.4); }

        #joystick-zone {
            position: relative; width: 60px; height: 60px; z-index: 150; flex-shrink: 0;
            background: rgba(0, 0, 0, 0.3) !important; 
            border: 2px solid rgba(255, 255, 255, 0.4); border-radius: 50%; 
            touch-action: none; display: flex; justify-content: center; align-items: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5), inset 0 2px 5px rgba(0,0,0,0.3);
        }
        #joystick-knob {
            width: 28px; height: 28px; background: radial-gradient(circle at 30% 30%, #ffcc80, #ff9800); 
            border-radius: 50%; border: 2px solid #fff; box-shadow: 0 3px 5px rgba(0,0,0,0.4); position: relative;
        }
        #joystick-hint {
            position: absolute; bottom: -15px; width: 100%; text-align: center;
            font-size: 9px; color: rgba(255, 255, 255, 0.7); pointer-events: none; font-weight: bold;
        }

        /* --- 經典實體麻雀樣式 --- */
        .tile {
            position: absolute; width: var(--tile-w); height: var(--tile-h);
            background-color: #ffffff; backdrop-filter: none; -webkit-backdrop-filter: none;
            border-radius: 4px; cursor: pointer;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            transform-style: preserve-3d; transition: transform 0.15s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: inset 0 1px 1px rgba(255,255,255,1), inset 0 -2px 3px rgba(0,0,0,0.1);
            border-top: 1px solid #f0f0f0; border-left: 1px solid #e0e0e0;
            border-bottom: 1px solid var(--tile-side-bottom); border-right: 1px solid var(--tile-side-right);
        }

        .tile-shadow-layer {
            position: absolute; width: 100%; height: 100%; top:0; left:0;
            border-radius: 4px; pointer-events: none; transform: translateZ(-1px);
            box-shadow: 2px 3px 4px rgba(0,0,0,0.5), 6px 8px 15px rgba(0,0,0,0.3);
            transition: all 0.15s;
        }

        .tile::before {
            content: ''; position: absolute; width: 100%; height: var(--depth);
            bottom: 0; left: 0; background-color: var(--tile-side-bottom);
            transform-origin: bottom; transform: rotateX(-90deg); border-radius: 0 0 4px 4px;
            background-image: linear-gradient(to bottom, rgba(255,255,255,0.1), rgba(0,0,0,0.2));
        }
        .tile::after {
            content: ''; position: absolute; width: var(--depth); height: 100%;
            top: 0; right: 0; background-color: var(--tile-side-right);
            transform-origin: right; transform: rotateY(90deg); border-radius: 0 4px 4px 0;
            background-image: linear-gradient(to right, rgba(255,255,255,0.1), rgba(0,0,0,0.1));
        }

        .tile.locked { background-color: #e0e0e0; box-shadow: inset 0 0 15px rgba(0,0,0,0.2); }
        .tile.locked .tile-shadow-layer { box-shadow: 1px 2px 2px rgba(0,0,0,0.4), 3px 4px 8px rgba(0,0,0,0.2); }
        .tile.locked img, .tile.locked .t-icon { opacity: 0.4; filter: grayscale(100%); }
        .tile.locked .t-text, .tile.locked .t-suit { color: #888; }

        .tile.selected { 
            background-color: #fff9c4; transform: translateZ(calc(var(--base-z) + 30px)) scale(1.05) !important; 
            z-index: 9999 !important; border-color: #ffb300;
        }
        .tile.selected .tile-shadow-layer {
            box-shadow: 10px 15px 30px rgba(0,0,0,0.6), 20px 30px 60px rgba(0,0,0,0.3);
            transform: translateZ(-30px);
        }

        .t-suit { position: absolute; top: 2px; right: 4px; font-size: 10px; color: #888; line-height: 1; backface-visibility: hidden; font-weight: bold; }
        .t-icon { font-size: 28px; line-height: 1; margin-top: 2px; backface-visibility: hidden; filter: drop-shadow(0 1px 1px rgba(0,0,0,0.2)); }
        .t-text { font-size: 11px; font-weight: 900; margin-top: 0px; color: #333; backface-visibility: hidden; }
        
        .c-red { color: #c62828; } .c-blue { color: #1565c0; } .c-green { color: #2e7d32; }

        #msg-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.7); display: none; flex-direction: column;
            justify-content: center; align-items: center; z-index: 200; text-align: center; padding: 20px;
        }
        .overlay-box {
            background: #fff; padding: 30px; border-radius: 20px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.7); border: 3px solid #e0e0e0; max-width: 90%; color: #333;
        }
        .overlay-title { font-size: 30px; font-weight: bold; margin-bottom: 20px; color: #ffb300; text-shadow: 1px 1px 0 rgba(0,0,0,0.2); }
        .overlay-verse { 
            font-size: 20px; color: #0288d1; line-height: 1.5; 
            background: #e3f2fd; padding: 20px; border-radius: 15px; 
            width: 100%; margin-bottom: 20px; border: 2px solid #bbdefb; font-weight: bold; 
        }

        #watermark {
            position: absolute; bottom: 95px; left: 20px; font-size: 11px;
            color: rgba(255, 255, 255, 0.4); pointer-events: none; z-index: 150; font-weight: bold;
            text-shadow: 0 1px 2px rgba(0,0,0,0.8);
        }
    </style>
</head>
<body>

<header>
    <div class="header-left">
        <button id="lang-btn" onclick="toggleLang()">EN</button>
        <select id="map-select" onchange="changeMap(this.value)">
            <option id="opt-random" value="random">🎲 無限隨機</option>
            <option id="opt-turtle" value="turtle">🐢 經典龜背</option>
            <option id="opt-castle" value="castle">🏰 堅固堡壘</option>
            <option id="opt-cross" value="cross">✝️ 榮耀十架</option>
            <option id="opt-bridge" value="bridge">🌉 恩典之橋</option>
            <option id="opt-towers" value="towers">🗼 雙子塔</option>
        </select>
    </div>
    <div id="status">剩餘: 0</div>
</header>

<div id="game-viewport">
    <div id="game-board"></div>
</div>

<footer>
    <div class="footer-btns">
        <button id="btn-new" class="btn btn-blue" onclick="forceNewGame()">🔄 新局</button>
        <button id="btn-undo" class="btn btn-orange" onclick="undoMove()">↩️ 復原</button>
        <button id="btn-hint" class="btn" onclick="autoHint()">💡 提示</button>
    </div>
    <div id="joystick-zone">
        <div id="joystick-knob"></div>
        <div id="joystick-hint">視角</div>
    </div>
</footer>

<div id="watermark">Powered by Google Gemini v40 (Bilingual Classic)</div>

<div id="msg-overlay">
    <div class="overlay-box">
        <div id="overlay-title" class="overlay-title"></div>
        <div id="overlay-verse" class="overlay-verse"></div>
        <button id="overlay-btn" class="btn" style="width: 220px; height: 50px; font-size: 20px;" onclick="nextLevel()">挑戰下一關</button>
    </div>
</div>

<script>
    // --- 雙語系統 i18n ---
    let currentLang = 'zh';

    const i18n = {
        'zh': {
            map_random: '🎲 無限隨機',
            map_turtle: '🐢 經典龜背',
            map_castle: '🏰 堅固堡壘',
            map_cross: '✝️ 榮耀十架',
            map_bridge: '🌉 恩典之橋',
            map_towers: '🗼 雙子塔',
            status_left: '剩餘: ',
            btn_new: '🔄 新局',
            btn_undo: '↩️ 復原',
            btn_hint: '💡 提示',
            joystick_hint: '視角',
            win_title: '🎉 哈利路亞！(勝利)',
            win_btn: '挑戰下一關 🚀',
            lose_title: '💪 恩典夠用 (暫時無路)',
            lose_btn: '重新開始 🔄',
            alert_no_move: '目前無解，請按「復原」或「新局」！',
            alert_map_fail: '生成地圖失敗，請重試',
            watermark: 'Powered by Google Gemini v40 (Bilingual Classic)'
        },
        'en': {
            map_random: '🎲 Random',
            map_turtle: '🐢 Classic Turtle',
            map_castle: '🏰 Castle',
            map_cross: '✝️ Cross',
            map_bridge: '🌉 Bridge',
            map_towers: '🗼 Twin Towers',
            status_left: 'Left: ',
            btn_new: '🔄 New',
            btn_undo: '↩️ Undo',
            btn_hint: '💡 Hint',
            joystick_hint: 'View',
            win_title: '🎉 Hallelujah! (You Win)',
            win_btn: 'Next Level 🚀',
            lose_title: '💪 Grace is Sufficient (No moves)',
            lose_btn: 'Restart 🔄',
            alert_no_move: 'No moves available! Try Undo or New Game.',
            alert_map_fail: 'Failed to generate map, please retry',
            watermark: 'Powered by Google Gemini v40 (Bilingual Classic)'
        }
    };

    const verses = {
        'zh': {
            win: ["流淚撒種的，必歡呼收割。(詩 126:5)", "那美好的仗我已經打過了。(提後 4:7)", "靠著那加給我力量的，凡事都能做。(腓 4:13)", "你們是世上的光。(太 5:14)", "得勝的，我要賜他在我寶座上與我同坐。(啟 3:21)"],
            lose: ["我的恩典是夠你用的。(林後 12:9)", "應當一無掛慮，只要凡事藉著禱告。(腓 4:6)", "你們要休息，要知道我是神。(詩 46:10)", "萬事都互相效力。(羅 8:28)"]
        },
        'en': {
            win: ["Those who sow with tears will reap with songs of joy. (Ps 126:5)", "I have fought the good fight. (2 Tim 4:7)", "I can do all this through him who gives me strength. (Phil 4:13)", "You are the light of the world. (Matt 5:14)", "To the one who is victorious, I will give the right to sit with me on my throne. (Rev 3:21)"],
            lose: ["My grace is sufficient for you. (2 Cor 12:9)", "Do not be anxious about anything, but in every situation, by prayer and petition. (Phil 4:6)", "Be still, and know that I am God. (Ps 46:10)", "In all things God works for the good of those who love him. (Rom 8:28)"]
        }
    };

    function toggleLang() {
        currentLang = currentLang === 'zh' ? 'en' : 'zh';
        document.getElementById('lang-btn').innerText = currentLang === 'zh' ? 'EN' : '繁';
        updateUI();
    }

    function updateUI() {
        const dict = i18n[currentLang];
        document.getElementById('opt-random').innerText = dict.map_random;
        document.getElementById('opt-turtle').innerText = dict.map_turtle;
        document.getElementById('opt-castle').innerText = dict.map_castle;
        document.getElementById('opt-cross').innerText = dict.map_cross;
        document.getElementById('opt-bridge').innerText = dict.map_bridge;
        document.getElementById('opt-towers').innerText = dict.map_towers;

        document.getElementById('btn-new').innerHTML = dict.btn_new;
        document.getElementById('btn-undo').innerHTML = dict.btn_undo;
        document.getElementById('btn-hint').innerHTML = dict.btn_hint;
        document.getElementById('joystick-hint').innerText = dict.joystick_hint;
        document.getElementById('watermark').innerText = dict.watermark;

        updateStatusText();

        // 刷新如果當前有彈窗
        const overlay = document.getElementById('msg-overlay');
        if (overlay.style.display === 'flex') {
            const btn = document.getElementById('overlay-btn');
            if(btn.className.includes('btn-blue')) {
                // Lose screen
                document.getElementById('overlay-title').innerText = dict.lose_title;
                btn.innerText = dict.lose_btn;
            } else {
                // Win screen
                document.getElementById('overlay-title').innerText = dict.win_title;
                btn.innerText = dict.win_btn;
            }
            // 經文不刷新，以免突然切換另一段經文，除非重新觸發
        }
    }

    // --- 麻雀庫 (保留中文面) ---
    const rawTiles = [
        {t:"摩西", i:"🌊", s:"萬", c:"c-red"}, {t:"大衛", i:"👑", s:"萬", c:"c-red"},
        {t:"保羅", i:"📜", s:"萬", c:"c-red"}, {t:"彼得", i:"🐟", s:"萬", c:"c-red"},
        {t:"約拿", i:"🐋", s:"萬", c:"c-red"}, {t:"馬利亞", i:"🤰", s:"萬", c:"c-red"},
        {t:"亞伯蘭", i:"🐑", s:"萬", c:"c-red"}, {t:"但以理", i:"🦁", s:"萬", c:"c-red"},
        {t:"教會", i:"⛪", s:"筒", c:"c-blue"}, {t:"西奈", i:"⛰️", s:"筒", c:"c-blue"},
        {t:"紅海", i:"🌊", s:"筒", c:"c-blue"}, {t:"伊甸", i:"🍎", s:"筒", c:"c-blue"},
        {t:"加利利", i:"🛶", s:"筒", c:"c-blue"}, {t:"聖殿", i:"🏛️", s:"筒", c:"c-blue"},
        {t:"耶利哥", i:"🧱", s:"筒", c:"c-blue"}, {t:"方舟", i:"🚢", s:"筒", c:"c-blue"},
        {t:"十架", i:"✝️", s:"索", c:"c-green"}, {t:"聖經", i:"📖", s:"索", c:"c-green"},
        {t:"五餅", i:"🍞", s:"索", c:"c-green"}, {t:"二魚", i:"🐟", s:"索", c:"c-green"},
        {t:"寶血", i:"🍷", s:"索", c:"c-green"}, {t:"聖靈", i:"🕊️", s:"索", c:"c-green"},
        {t:"信", i:"🛡️", s:"番", c:"#333"}, {t:"望", i:"⚓", s:"番", c:"#333"},
        {t:"愛", i:"❤️", s:"番", c:"#333"}, {t:"阿們", i:"🙏", s:"番", c:"#333"},
        {t:"禱告", i:"🤲", s:"番", c:"#333"}, {t:"復活", i:"🌅", s:"番", c:"#333"},
        {t:"挪亞", i:"🌈", s:"萬", c:"c-red"}, {t:"約書亞", i:"🎺", s:"萬", c:"c-red"},
        {t:"以利亞", i:"🔥", s:"萬", c:"c-red"}, 
        {t:"葡萄", i:"🍇", s:"索", c:"c-green"}, {t:"磐石", i:"🪨", s:"索", c:"c-green"},
        {t:"亮光", i:"💡", s:"筒", c:"c-blue"}, {t:"天國", i:"☁️", s:"筒", c:"c-blue"},
        {t:"喜樂", i:"😄", s:"番", c:"#333"}
    ];
    
    // --- 地圖生成 ---
    const MapBlueprints = {
        turtle: () => generatePyramid(6, 8, [6,6, 4,4, 2,2, 1,1]), 
        castle: () => generateWall(6, 8),
        cross: () => generateCross(),
        bridge: () => generateBridge(),
        towers: () => generateTowers(),
        random: () => generateChaos()
    };
    function generatePyramid(rows, cols, layerSizes) { let slots=[]; let cl=0; for(let i=0;i<layerSizes.length;i+=2){ let h=layerSizes[i], w=layerSizes[i+1]; let sr=Math.floor((rows-h)/2), sc=Math.floor((cols-w)/2); for(let r=0;r<h;r++) for(let c=0;c<w;c++) slots.push([cl, sr+r, sc+c]); cl++; } return slots; }
    function generateWall(rows, cols) { let slots=[]; for(let r=0;r<rows;r++) for(let c=0;c<cols;c++) { slots.push([0, r, c]); if(r===0||r===rows-1||c===0||c===cols-1) slots.push([1, r, c]); } return slots; }
    function generateCross() { let slots=[]; for(let r=0;r<8;r++) { slots.push([0,r,3]); slots.push([0,r,4]); slots.push([1,r,3]); } for(let c=0;c<8;c++) { slots.push([0,2,c]); slots.push([0,3,c]); slots.push([1,2,c]); } slots.push([2,2,3]); slots.push([2,3,3]); return slots; }
    function generateBridge() { let slots=[]; for(let c=0;c<10;c++) { slots.push([0,2,c]); slots.push([0,3,c]); if(c<3||c>6) { slots.push([1,2,c]); slots.push([1,3,c]); slots.push([2,2,c]); } } return slots; }
    function generateTowers() { let slots=[]; for(let r=0;r<6;r++) for(let c=0;c<8;c++) { if(c<2||c>5) { slots.push([0,r,c]); slots.push([1,r,c]); if(r>1&&r<4) slots.push([2,r,c]); } else if(r===2||r===3) slots.push([0,r,c]); } return slots; }
    
    // v35.1 修復版防止座標重疊的隨機生成
    function generateChaos() { 
        let slots=[]; let occupied = new Set();
        for(let r=0;r<6;r++) for(let c=0;c<8;c++) { slots.push([0,r,c]); occupied.add(`0,${r},${c}`); }
        let added = 0;
        while(added < 32) {
            let z = Math.floor(Math.random()*2)+1;
            let r = Math.floor(Math.random()*4)+1;
            let c = Math.floor(Math.random()*6)+1;
            let key = `${z},${r},${c}`;
            if(!occupied.has(key)) { slots.push([z,r,c]); occupied.add(key); added++; }
        }
        return slots; 
    }

    let tiles = [];
    let selectedTile = null;
    let moveHistory = [];
    let tileW = 44, tileH = 58; 
    let globalScale = 1;
    let viewRotX = 30;
    let viewRotZ = 0;

    function changeMap(val) { startGame(val); }
    function forceNewGame() { startGame(document.getElementById('map-select').value); }
    
    function nextLevel() {
        const maps = ['random','turtle','castle','cross','bridge','towers'];
        document.getElementById('map-select').value = maps[Math.floor(Math.random() * maps.length)];
        startGame(document.getElementById('map-select').value);
    }

    function startGame(mapType) {
        document.getElementById('msg-overlay').style.display = 'none';
        const board = document.getElementById('game-board');
        board.innerHTML = ''; tiles = []; selectedTile = null; moveHistory = [];
        viewRotX = 30; viewRotZ = 0; 

        // v35.1: 保證有解循環
        let solvableMapFound = false;
        let attemptMap = 0;
        
        while (!solvableMapFound && attemptMap < 50) {
            let slots = MapBlueprints[mapType]();
            if(slots.length % 2 !== 0) slots.pop();
            
            let minC = Infinity, minR = Infinity;
            slots.forEach(s => { if(s[1]<minR) minR=s[1]; if(s[2]<minC) minC=s[2]; });
            slots.forEach(s => { s[1]-=minR; s[2]-=minC; });

            let virtualTiles = slots.map((s, i) => ({ id: i, z: s[0], r: s[1], c: s[2], active: true }));
            
            let pairs = [], tempTiles, success = false, attemptSolve = 0;
            while(!success && attemptSolve < 20) {
                tempTiles = JSON.parse(JSON.stringify(virtualTiles)); pairs = []; let possible = true;
                while(tempTiles.some(t => t.active)) {
                    let available = getAvailableTiles(tempTiles);
                    if(available.length < 2) { possible = false; break; }
                    let t1 = available.splice(Math.floor(Math.random()*available.length), 1)[0];
                    let t2 = available.splice(Math.floor(Math.random()*available.length), 1)[0];
                    pairs.push([t1.id, t2.id]); 
                    tempTiles.find(t=>t.id===t1.id).active = false;
                    tempTiles.find(t=>t.id===t2.id).active = false;
                }
                if(possible) success = true; 
                attemptSolve++;
            }

            if(success) {
                solvableMapFound = true;
                applyGame(virtualTiles, pairs);
            } else {
                if(mapType !== 'random') {
                    solvableMapFound = true; 
                    let backupPairs = [];
                    for(let i=0; i<virtualTiles.length; i+=2) backupPairs.push([i, i+1]);
                    applyGame(virtualTiles, backupPairs);
                }
                attemptMap++;
            }
        }
        if(!solvableMapFound) alert(i18n[currentLang].alert_map_fail);
    }

    function applyGame(virtualTiles, pairs) {
        let totalPairs = pairs.length, cardInventory = [], shuffledTypes = [...rawTiles].sort(()=>Math.random()-0.5);
        let typeIndex = 0;
        for(let i=0; i<totalPairs; i++) { 
            let card = shuffledTypes[typeIndex % shuffledTypes.length];
            cardInventory.push(card); 
            typeIndex++;
        }
        let finalTilesData = new Array(virtualTiles.length);
        pairs.forEach((pair, idx) => { 
            finalTilesData[pair[0]] = cardInventory[idx]; 
            finalTilesData[pair[1]] = cardInventory[idx]; 
        });

        renderTiles(virtualTiles, finalTilesData);
        setTimeout(fitBoard, 50);
        updateStatusText();
    }

    function getAvailableTiles(tileSet) { return tileSet.filter(t => t.active && !checkLockedInSet(t, tileSet)); }
    function checkLockedInSet(tile, tileSet) {
        let hasTop=false, hasLeft=false, hasRight=false;
        for(let other of tileSet) {
            if(!other.active || other.id === tile.id) continue;
            if(other.z === tile.z+1 && other.r === tile.r && other.c === tile.c) hasTop = true;
            if(other.z === tile.z && other.r === tile.r) { if(other.c === tile.c-1) hasLeft=true; if(other.c === tile.c+1) hasRight=true; }
        }
        return hasTop || (hasLeft && hasRight);
    }

    function renderTiles(slots, dataMap) {
        const board = document.getElementById('game-board');
        let maxX=0, maxY=0;
        slots.forEach((slot, index) => {
            if(slot.c > maxX) maxX = slot.c; if(slot.r > maxY) maxY = slot.r;
            const el = document.createElement('div');
            el.className = 'tile';
            
            const card = dataMap[index];
            el.innerHTML = `<div class="tile-shadow-layer"></div><div class="t-suit">${card.s}</div><div class="t-icon ${card.c}">${card.i}</div><div class="t-text ${card.c}">${card.t}</div>`;
            
            let left = slot.c * tileW; 
            let top = slot.r * tileH; 
            let zHeight = slot.z * 12; 
            
            el.style.left = left + 'px'; el.style.top = top + 'px'; 
            el.style.transform = `translateZ(${zHeight}px)`; 
            el.style.setProperty('--base-z', zHeight + 'px');
            el.style.zIndex = slot.z * 10 + slot.r; 
            
            const tileObj = { el: el, data: card, z: slot.z, r: slot.r, c: slot.c, active: true, id: index };
            el.onclick = () => onTileClick(tileObj);
            board.appendChild(el);
            tiles.push(tileObj);
        });
        board.style.width = (maxX + 1) * tileW + 'px';
        board.style.height = (maxY + 1) * tileH + 'px';
        updateLockStatus();
    }

    function updateLockStatus() { tiles.forEach(t => { if(!t.active) return; t.isLocked = checkLocked(t); t.el.classList.toggle('locked', t.isLocked); }); }
    
    function checkLocked(tile) {
        let hasTop=false, hasLeft=false, hasRight=false;
        for(let other of tiles) {
            if(!other.active || other === tile) continue;
            if(other.z === tile.z+1 && other.r === tile.r && other.c === tile.c) hasTop = true;
            if(other.z === tile.z && other.r === tile.r) { if(other.c === tile.c-1) hasLeft=true; if(other.c === tile.c+1) hasRight=true; }
        }
        return hasTop || (hasLeft && hasRight);
    }

    function onTileClick(tile) {
        if(!tile.active || tile.isLocked) return;
        if(selectedTile === tile) { tile.el.classList.remove('selected'); selectedTile = null; }
        else if(selectedTile) {
            if(tile.data.t === selectedTile.data.t) {
                moveHistory.push([tile, selectedTile]);
                tile.active=false; selectedTile.active=false;
                tile.el.style.display='none'; selectedTile.el.style.display='none'; 
                selectedTile = null;
                updateLockStatus(); updateStatusText(); checkGameState();
            } else { selectedTile.el.classList.remove('selected'); selectedTile = tile; tile.el.classList.add('selected'); }
        } else { selectedTile = tile; tile.el.classList.add('selected'); }
    }

    function undoMove() {
        if (moveHistory.length === 0) return; 
        const lastMove = moveHistory.pop();
        const tile1 = lastMove[0]; const tile2 = lastMove[1];
        tile1.active = true; tile2.active = true;
        tile1.el.style.display = ''; tile2.el.style.display = '';
        tile1.el.classList.remove('selected'); tile2.el.classList.remove('selected');
        if(selectedTile) { selectedTile.el.classList.remove('selected'); selectedTile = null; }
        updateLockStatus(); updateStatusText();
    }

    function checkGameState() { if(tiles.filter(t=>t.active).length===0) showModal('win'); else if(!hasAvailableMoves()) showModal('lose'); }
    function hasAvailableMoves() {
        let free = tiles.filter(t=>t.active && !t.isLocked);
        for(let i=0;i<free.length;i++) for(let j=i+1;j<free.length;j++) if(free[i].data.t === free[j].data.t) return true;
        return false;
    }

    function showModal(type) {
        const overlay = document.getElementById('msg-overlay');
        const title = document.getElementById('overlay-title');
        const verse = document.getElementById('overlay-verse');
        const btn = document.getElementById('overlay-btn');
        const dict = i18n[currentLang];
        const vDict = verses[currentLang];

        if(type === 'win') {
            title.innerText = dict.win_title;
            title.style.color = "#ffb300";
            verse.innerText = vDict.win[Math.floor(Math.random() * vDict.win.length)];
            btn.innerText = dict.win_btn;
            btn.onclick = () => nextLevel();
            btn.className = "btn"; 
        } else {
            title.innerText = dict.lose_title;
            title.style.color = "#4fc3f7";
            verse.innerText = vDict.lose[Math.floor(Math.random() * vDict.lose.length)];
            btn.innerText = dict.lose_btn;
            btn.onclick = () => forceNewGame();
            btn.className = "btn btn-blue"; 
        }
        overlay.style.display='flex';
    }

    function autoHint() {
        let free=tiles.filter(t=>t.active && !t.isLocked);
        for(let i=0;i<free.length;i++) for(let j=i+1;j<free.length;j++) if(free[i].data.t === free[j].data.t) {
            free[i].el.style.background='#b3e5fc'; free[j].el.style.background='#b3e5fc';
            setTimeout(()=>{ free[i].el.style.background=''; free[j].el.style.background=''; }, 1500); return;
        }
        alert(i18n[currentLang].alert_no_move);
    }

    function updateStatusText() { 
        document.getElementById('status').innerText = i18n[currentLang].status_left + tiles.filter(t => t.active).length; 
    }

    function applyViewTransform() {
        const board = document.getElementById('game-board');
        if(!board) return;
        board.style.transform = `translate(-50%, -50%) rotateX(${viewRotX}deg) rotateZ(${viewRotZ}deg) scale(${globalScale})`;
    }

    function fitBoard() {
        const board = document.getElementById('game-board');
        const view = document.getElementById('game-viewport');
        if(!board || !view) return;
        board.style.transform = 'none';
        const boardW = board.scrollWidth; const boardH = board.scrollHeight;
        const viewW = view.clientWidth; const viewH = view.clientHeight;
        globalScale = Math.min((viewW - 40) / boardW, (viewH - 40) / boardH);
        applyViewTransform();
    }
    window.addEventListener('resize', fitBoard);

    const joystickZone = document.getElementById('joystick-zone');
    const joystickKnob = document.getElementById('joystick-knob');
    let isDragging = false; let startX, startY; let initialRotX, initialRotZ;

    function handleStart(e) {
        isDragging = true;
        startX = e.type.includes('mouse') ? e.clientX : e.touches[0].clientX;
        startY = e.type.includes('mouse') ? e.clientY : e.touches[0].clientY;
        initialRotX = viewRotX; initialRotZ = viewRotZ;
        joystickKnob.style.transition = 'none';
    }

    function handleMove(e) {
        if (!isDragging) return;
        e.preventDefault(); 
        const clientX = e.type.includes('mouse') ? e.clientX : e.touches[0].clientX;
        const clientY = e.type.includes('mouse') ? e.clientY : e.touches[0].clientY;
        const deltaX = clientX - startX; const deltaY = clientY - startY;
        const maxDist = 30; const dist = Math.sqrt(deltaX*deltaX + deltaY*deltaY);
        const limitedDist = Math.min(dist, maxDist);
        const angle = Math.atan2(deltaY, deltaX);
        const knobX = Math.cos(angle) * limitedDist; const knobY = Math.sin(angle) * limitedDist;
        joystickKnob.style.transform = `translate(${knobX}px, ${knobY}px)`;
        viewRotZ = initialRotZ + (deltaX * 0.5); 
        viewRotX = initialRotX - (deltaY * 0.5); 
        viewRotX = Math.max(0, Math.min(viewRotX, 60)); 
        applyViewTransform();
    }

    function handleEnd() {
        isDragging = false;
        joystickKnob.style.transition = 'transform 0.2s';
        joystickKnob.style.transform = 'translate(0, 0)';
    }

    joystickZone.addEventListener('mousedown', handleStart);
    joystickZone.addEventListener('touchstart', handleStart, {passive: false});
    window.addEventListener('mousemove', handleMove);
    window.addEventListener('touchmove', handleMove, {passive: false});
    window.addEventListener('mouseup', handleEnd);
    window.addEventListener('touchend', handleEnd);

    if ('serviceWorker' in navigator) {
        window.addEventListener('load', function() {
            navigator.serviceWorker.register('./sw.js')
                .then(function(reg) { console.log('SW OK'); }, function(err) { console.log('SW Fail'); });
        });
    }

    // 初始化 UI 語言
    updateUI();
    startGame('random'); 
</script>
