<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>快樂學聖經 / Bible Verse Game</title>
    
    <link rel="icon" type="image/png" href="https://cokcok1.github.io/Game2/%E5%BF%AB%E6%A8%82%E5%AD%B8%E8%81%96%E7%B6%93.png">
    <link rel="apple-touch-icon" href="https://cokcok1.github.io/Game2/%E5%BF%AB%E6%A8%82%E5%AD%B8%E8%81%96%E7%B6%93.png">
    <link rel="shortcut icon" href="https://cokcok1.github.io/Game2/%E5%BF%AB%E6%A8%82%E5%AD%B8%E8%81%96%E7%B6%93.png">

    <link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

    <style>
        :root {
            --bg-blue: #e3f2fd;
            --primary-blue: #64b5f6;
            --primary-dark: #1976d2;
            --text-color: #546e7a;
            --success-color: #4db6ac;
            --explain-color: #9c27b0;
        }

        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100vh; 
            height: 100dvh; 
            overflow: hidden;
            font-family: 'Zen Maru Gothic', sans-serif;
            background-color: var(--bg-blue);
            background-image: radial-gradient(#bbdefb 15%, transparent 16%), radial-gradient(#bbdefb 15%, transparent 16%);
            background-size: 20px 20px;
            background-position: 0 0, 10px 10px;
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .game-container {
            width: 95%; 
            max-width: 600px;
            height: 94vh; 
            height: 94dvh; 
            background: rgba(255, 255, 255, 0.95);
            padding: 15px;
            border-radius: 24px;
            box-shadow: 0 5px 0 rgba(100, 181, 246, 0.3);
            border: 3px solid #fff;
            display: flex;
            flex-direction: column; 
            gap: 8px; 
            box-sizing: border-box;
            position: relative;
            margin-bottom: env(safe-area-inset-bottom);
        }

        .header-section { flex: 0 0 auto; }

        .hud {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #f1f8e9;
            padding: 6px 10px;
            border-radius: 15px;
            border: 2px dashed var(--primary-blue);
            margin-bottom: 5px;
            gap: 5px;
        }

        .lives { font-size: 1.1rem; letter-spacing: 1px; color: #e57373; white-space: nowrap; }
        
        .btn-group { display: flex; gap: 5px; }

        .small-btn {
            background: #fff;
            border: 2px solid var(--primary-blue);
            border-radius: 10px;
            color: var(--primary-blue);
            font-family: 'Zen Maru Gothic', sans-serif;
            font-weight: 700;
            padding: 4px 8px;
            font-size: 0.8rem;
            cursor: pointer;
            transition: all 0.1s;
            box-shadow: 0 2px 0 rgba(0,0,0,0.05);
            white-space: nowrap;
        }
        .small-btn:active { transform: translateY(2px); box-shadow: none; }

        .mode-btn { background-color: #e3f2fd; border-style: dashed; }

        .score-board { 
            color: var(--primary-dark); 
            font-weight: 900; 
            font-size: 0.95rem;
            background: #fff;
            padding: 4px 8px;
            border-radius: 12px;
            box-shadow: 0 2px 0 rgba(0,0,0,0.05);
            white-space: nowrap;
        }

        .verse-card {
            text-align: center;
            min-height: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .verse-ref {
            font-size: 1.3rem; 
            font-weight: 900;
            color: var(--primary-blue);
            text-shadow: 2px 2px 0 #fff;
            margin: 0;
            line-height: 1.2;
        }

        .zone-label {
            color: var(--primary-blue);
            font-weight: 700;
            margin-left: 5px;
            font-size: 0.9rem;
            margin-bottom: 2px;
        }

        .answer-section { flex: 1; display: flex; flex-direction: column; min-height: 0; }
        .option-section { flex: 1; display: flex; flex-direction: column; min-height: 0; }

        .zone {
            flex: 1; 
            border-radius: 16px;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            align-content: flex-start; 
            gap: 8px;
            padding: 10px;
            overflow-y: auto; 
            -webkit-overflow-scrolling: touch;
        }

        .zone::-webkit-scrollbar { width: 5px; }
        .zone::-webkit-scrollbar-thumb { background: #b3e5fc; border-radius: 3px; }

        .answer-zone { background-color: #eceff1; border: 2px solid #cfd8dc; }
        .answer-zone.correct { background-color: #e0f2f1; border-color: var(--success-color); }
        .answer-zone.wrong { background-color: #ffebee; border-color: #ef5350; animation: shake 0.4s; }

        .option-zone { background-color: #e3f2fd; border: 2px dashed var(--primary-blue); }

        .word-brick {
            background: #fff;
            border: 2px solid var(--primary-blue);
            border-bottom: 4px solid var(--primary-blue);
            border-radius: 12px;
            padding: 8px 12px; 
            font-size: 0.95rem; 
            font-weight: 700;
            color: var(--text-color);
            cursor: pointer;
            user-select: none;
            transition: transform 0.1s;
            height: fit-content;
            -webkit-tap-highlight-color: transparent;
        }
        
        .word-brick:active { transform: translateY(2px); border-bottom-width: 2px; margin-top: 2px; }
        .word-brick:hover { background-color: #e3f2fd; }

        .footer-section { flex: 0 0 auto; margin-top: 5px; padding-bottom: 5px; }

        /* 修改：為容納4個按鈕調整間距和內邊距 */
        .controls { 
            display: grid; 
            grid-template-columns: 1fr 1fr 1fr 2fr; 
            gap: 8px; 
        }

        .btn {
            border: none;
            padding: 10px 5px; /* 縮小內邊距以適應小螢幕 */
            font-size: 1rem; /* 稍微縮小字體 */
            font-weight: 900;
            border-radius: 16px;
            cursor: pointer;
            color: white;
            font-family: 'Zen Maru Gothic', sans-serif;
            box-shadow: 0 4px 0 rgba(0,0,0,0.1);
            position: relative; 
            z-index: 10;
        }

        /* 針對超小螢幕的微調 */
        @media (max-width: 380px) {
            .btn { font-size: 0.85rem; padding: 8px 2px; }
            .controls { gap: 5px; }
        }

        .btn:active { transform: translateY(4px); box-shadow: none; }
        .btn-reset { background: #90a4ae; }
        .btn-submit { background: var(--primary-blue); }
        .btn-submit:hover { filter: brightness(1.05); }
        .btn-explain { background: var(--explain-color); }
        .btn-explain:hover { filter: brightness(1.1); }
        .btn:disabled { background: #cfd8dc; color: #90a4ae; box-shadow: none; transform: translateY(4px); cursor: not-allowed; }

        #messageArea { min-height: 20px; text-align: center; }
        .msg-text { font-size: 0.9rem; font-weight: 700; margin: 2px 0; }

        .correction-box {
            display: none;
            background: #fffde7;
            border: 2px solid #fdd835;
            color: #f57f17;
            padding: 8px 12px;
            border-radius: 12px;
            text-align: center;
            font-weight: 700;
            margin-bottom: 5px;
            animation: popIn 0.4s;
            max-height: 80px;  
            overflow-y: auto;  
            font-size: 0.9rem; 
            line-height: 1.4;  
            white-space: normal; 
            word-wrap: break-word;
        }
        
        .correction-box::-webkit-scrollbar { width: 4px; }
        .correction-box::-webkit-scrollbar-thumb { background: #fdd835; border-radius: 2px; }

        .answer-placeholder { width: 100%; text-align: center; color: #b0bec5; margin-top: 20px; font-weight: 700; font-size: 0.9rem; }

        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: 999; justify-content: center; align-items: center; backdrop-filter: blur(5px); }
        .modal-card { background: #fff; padding: 30px; border-radius: 30px; text-align: center; width: 85%; max-width: 350px; border: 5px solid var(--primary-blue); box-shadow: 0 10px 20px rgba(0,0,0,0.1); animation: popIn 0.3s; }
        
        .modal-actions {
            display: flex;
            gap: 10px;
            margin-top: 15px;
            justify-content: center;
        }
        .modal-actions .btn {
            padding: 10px 20px;
            font-size: 1rem;
            flex: 1; 
        }
        
        .watermark { 
            position: fixed; 
            bottom: 5px; 
            right: 10px; 
            text-align: right; 
            font-size: 0.7rem; 
            color: var(--primary-dark); 
            opacity: 0.6; 
            font-weight: 700; 
            z-index: 5; 
            pointer-events: none; 
        }
        .watermark span { display: block; font-size: 0.6rem; font-weight: 400; }

        @keyframes popIn { from { transform: scale(0.5); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        @keyframes shake { 0%, 100% {transform: translateX(0);} 25% {transform: translateX(-5px);} 75% {transform: translateX(5px);} }

    </style>
</head>
<body>

<div class="game-container">
    <div class="header-section">
        <div class="hud">
            <div class="lives" id="livesDisplay">❤️❤️❤️❤️❤️</div>
            <div class="btn-group">
                <button class="small-btn" id="langBtn" onclick="toggleLanguage()">English</button>
                <button class="small-btn mode-btn" id="modeBtn" onclick="toggleMode()">🔢 順序</button>
            </div>
            <div class="score-board" id="scoreDisplay">星星: 0</div>
    </div>
        <div class="verse-card">
            <div class="verse-ref" id="referenceDisplay">Loading...</div>
        </div>
        <div id="correctionBox" class="correction-box">
            <span id="correctionLabel">💡 正確答案：</span><span id="correctionText"></span>
        </div>
    </div>

    <div class="answer-section">
        <div class="zone-label" id="zoneLabelAnswer">☁️ 你的排列</div>
        <div class="zone answer-zone" id="answerZone"></div>
    </div>

    <div class="option-section">
        <div class="zone-label" id="zoneLabelOption">🦕 詞語積木</div>
        <div class="zone option-zone" id="optionZone"></div>
    </div>

    <div class="footer-section">
        <div id="messageArea">
            <div class="msg-text" id="message"></div>
        </div>
        <div class="controls" id="controlsArea">
            <button class="btn btn-reset" id="prevBtn" onclick="prevLevel()" disabled>上一題</button>
            <button class="btn btn-reset" id="resetBtn" onclick="resetRound()" disabled>重來</button>
            <button class="btn btn-explain" id="explainBtn" onclick="openExplanation()" disabled style="display:none;">解釋</button>
            <button class="btn btn-submit" id="checkBtn" onclick="checkAnswer()" disabled>載入中...</button>
        </div>
    </div>
</div>

<div class="watermark">
    Powered by Gemini
    <span>Ver 6.8 (Review Button) | 2025.12.26</span>
</div>

<div class="modal-overlay" id="gameModal">
    <div class="modal-card">
        <h2 style="color:var(--primary-dark); margin-top:0;" id="modalTitle">TITLE</h2>
        <p id="modalText" style="color:#666; font-size:1.1rem; margin-bottom:20px;">Text</p>
        <div class="modal-actions" id="modalActions">
        </div>
    </div>
</div>

<script>
    const CONFIG = {
        zh: {
            url: 'https://cokcok1.github.io/Game2/Bible-Verses-Life.txt',
            ui: {
                yourArrangement: "☁️ 你的排列",
                wordBricks: "🦕 詞語積木",
                prevLevel: "上一題",  // 新增翻譯
                reset: "重來",
                check: "完成！",
                loading: "載入中...",
                nextLevel: "下一關 ➔",
                nextQuestion: "下一題 ➔",
                correctMsg: "🎉 哇！你答對了！太棒了！",
                wrongMsg: "哎呀，順序不對，正確答案是：",
                gameOverTitle: "遊戲結束",
                gameOverMsg: "你獲得了 <b>{score}</b> 顆星星！<br>休息一下再來挑戰！",
                restart: "重新開始",
                loadingText: "正在載入金句...",
                loadFail: "⚠️ 金句載入失敗",
                loadFailMsg: "無法讀取金句檔案，請檢查格式或網路。",
                correctLabel: "💡 正確答案：",
                placeholder: "把詞語拉到這裡喔！",
                scorePrefix: "星星: ",
                langBtnText: "English", 
                loadEmpty: "請先選詞語喔！加油！",
                modeRandom: "🔀 隨機",
                modeSeq: "🔢 順序",
                btnRestartAll: "從頭開始",
                btnContinue: "繼續挑戰"
            }
        },
        en: {
            url: 'https://cokcok1.github.io/Game2/Bible-Verses-E.txt',
            ui: {
                yourArrangement: "☁️ Your Arrangement",
                wordBricks: "🦕 Word Bricks",
                prevLevel: "Prev",   // 新增翻譯
                reset: "Reset",
                check: "Check!",
                loading: "Loading...",
                nextLevel: "Next Level ➔",
                nextQuestion: "Next Question ➔",
                correctMsg: "🎉 Awesome! You got it right!",
                wrongMsg: "Oops, incorrect. The answer is:",
                gameOverTitle: "Game Over",
                gameOverMsg: "You earned <b>{score}</b> Stars!<br>Take a rest and try again!",
                restart: "Play Again",
                loadingText: "Loading Verses...",
                loadFail: "⚠️ Load Failed",
                loadFailMsg: "Cannot load verses file.",
                correctLabel: "💡 Answer: ",
                placeholder: "Drag words here!",
                scorePrefix: "Stars: ",
                langBtnText: "繁體中文", 
                loadEmpty: "Please select words first!",
                modeRandom: "🔀 Random",
                modeSeq: "🔢 Order",
                btnRestartAll: "Restart All",
                btnContinue: "Continue"
            }
        }
    };

    let currentLang = 'zh'; 
    let isRandomMode = false; 

    let rawVersesData = []; 
    let gameVersesData = []; 
    
    let currentScore = 0;
    let lives = 5; 
    let currentVerseIndex = 0; 
    let savedSeqIndex = 0; 

    let currentSegments = []; 
    let shuffledSegments = []; 
    let playerAnswer = []; 

    function loadSavedData() {
        const savedScore = localStorage.getItem('bibleGame_score');
        const savedIndex = localStorage.getItem('bibleGame_seqIndex');
        if (savedScore !== null) currentScore = parseInt(savedScore, 10);
        if (savedIndex !== null) savedSeqIndex = parseInt(savedIndex, 10);
    }

    function saveProgress() {
        localStorage.setItem('bibleGame_score', currentScore);
        if (!isRandomMode) {
            localStorage.setItem('bibleGame_seqIndex', savedSeqIndex);
        }
    }

    function resetAllProgress() {
        currentScore = 0;
        savedSeqIndex = 0; 
        localStorage.setItem('bibleGame_score', 0);
        localStorage.setItem('bibleGame_seqIndex', 0);
    }

    function resetScoreOnly() {
        currentScore = 0;
        localStorage.setItem('bibleGame_score', 0);
    }

    function toggleLanguage() {
        currentLang = (currentLang === 'zh') ? 'en' : 'zh';
        if (currentLang === 'zh') {
            isRandomMode = false; 
        } else {
            isRandomMode = true;  
        }
        loadSavedData();
        lives = 5;
        updateUIText();
        loadVersesFromFile();
    }

    function toggleMode() {
        isRandomMode = !isRandomMode;
        lives = 5;
        updateUIText();
        prepareGameData();
        initGame();
    }

    function updateUIText() {
        const t = CONFIG[currentLang].ui;
        document.getElementById('zoneLabelAnswer').innerText = t.yourArrangement;
        document.getElementById('zoneLabelOption').innerText = t.wordBricks;
        document.getElementById('prevBtn').innerText = t.prevLevel; // 更新上一題文字
        document.getElementById('resetBtn').innerText = t.reset;
        document.getElementById('checkBtn').innerText = t.loading; 
        document.getElementById('langBtn').innerText = t.langBtnText;
        document.getElementById('scoreDisplay').innerText = t.scorePrefix + currentScore;
        document.getElementById('correctionLabel').innerText = t.correctLabel;
        
        const modeBtn = document.getElementById('modeBtn');
        const explainBtn = document.getElementById('explainBtn');
        const controlsArea = document.getElementById('controlsArea');

        // 佈局調整，容納新的上一題按鈕
        if (currentLang === 'en') {
            modeBtn.style.display = 'none';
            explainBtn.style.display = 'none';
            controlsArea.style.gridTemplateColumns = '1fr 1fr 2fr'; // Prev, Reset, Check
        } else {
            modeBtn.style.display = 'inline-block';
            modeBtn.innerText = isRandomMode ? t.modeRandom : t.modeSeq;
            explainBtn.style.display = 'inline-block';
            explainBtn.innerText = "解釋";
            controlsArea.style.gridTemplateColumns = '1fr 1fr 1fr 2.2fr'; // Prev, Reset, Explain, Check
        }
        
        hideCorrection();
        document.getElementById('message').innerText = "";
    }

    async function loadVersesFromFile() {
        const refDisplay = document.getElementById('referenceDisplay');
        const checkBtn = document.getElementById('checkBtn');
        const t = CONFIG[currentLang].ui;

        try {
            refDisplay.innerText = t.loadingText;
            checkBtn.disabled = true;
            
            const url = CONFIG[currentLang].url;
            const response = await fetch(url + '?t=' + new Date().getTime());
            if (!response.ok) throw new Error('網路回應錯誤');
            const text = await response.text();
            const lines = text.split('\n');
            
            rawVersesData = []; 
            
            lines.forEach(line => {
                if (!line || line.trim() === "") return;
                
                if (line.includes(" : /")) {
                    const splitIdx = line.indexOf(" : /");
                    const ref = line.substring(0, splitIdx).trim();
                    const contentRaw = line.substring(splitIdx + 4).trim();
                    const segments = contentRaw.split('/').map(s => s.trim()).filter(s => s.length > 0);
                    if (segments.length > 0) rawVersesData.push({ ref, segments });
                } else {
                    const parts = line.split(':');
                    if (parts.length >= 2) {
                        let ref = parts[0].trim();
                        let contentStartIndex = 1;
                        if (parts.length > 2 && /^\s*[\d\-\,\s]+\s*$/.test(parts[1])) {
                            ref += ":" + parts[1].trim(); 
                            contentStartIndex = 2;
                        }
                        const contentRaw = parts.slice(contentStartIndex).join(':').trim();
                        const segments = contentRaw.split('/').map(s => s.trim()).filter(s => s.length > 0);
                        if (segments.length > 1) rawVersesData.push({ ref, segments });
                    }
                }
            });
            
            if (rawVersesData.length === 0) throw new Error('No Data');
            console.log(`Loaded ${rawVersesData.length} verses.`);
            
            loadSavedData();
            prepareGameData();
            initGame();
        } catch (error) {
            console.error("Load failed:", error);
            refDisplay.innerText = t.loadFail;
            showMessage(t.loadFailMsg, "#ff4757");
            checkBtn.innerText = "Error";
            checkBtn.disabled = true;
        }
    }

    function prepareGameData() {
        gameVersesData = [...rawVersesData];
        if (isRandomMode) {
            shuffleArray(gameVersesData);
            currentVerseIndex = 0; 
        } else {
            currentVerseIndex = savedSeqIndex;
        }
    }

    function initGame() {
        updateUI(); 
        document.getElementById('checkBtn').disabled = false;
        loadLevel();
    }

    function loadLevel() {
        const t = CONFIG[currentLang].ui;
        const safeIndex = currentVerseIndex % gameVersesData.length;
        const verseObj = gameVersesData[safeIndex];
        
        document.getElementById('referenceDisplay').innerText = verseObj.ref;
        showMessage("");
        hideCorrection();
        
        document.getElementById('answerZone').className = "zone answer-zone";
        const checkBtn = document.getElementById('checkBtn');
        checkBtn.innerText = t.check;
        checkBtn.onclick = checkAnswer;
        checkBtn.style.background = "var(--primary-blue)";
        
        const explainBtn = document.getElementById('explainBtn');
        explainBtn.disabled = true;
        
        // 控制「上一題」按鈕是否可以按 (如果已經是第0題，就不能再退)
        const prevBtn = document.getElementById('prevBtn');
        prevBtn.disabled = (currentVerseIndex === 0);
        
        currentSegments = [...verseObj.segments];
        shuffledSegments = [...verseObj.segments];
        playerAnswer = [];
        shuffleArray(shuffledSegments);
        renderZones();
    }

    // --- 新增：上一題功能 ---
    function prevLevel() {
        if (currentVerseIndex > 0) {
            currentVerseIndex--;
            loadLevel();
            updateUI();
        }
    }
    // ----------------------

    function getExplanationParams(fullRef) {
        const match = fullRef.match(/\((.*?)\)/);
        if (!match) return null;
        
        const coreRef = match[1]; 
        const lastSpaceIndex = coreRef.lastIndexOf(' ');
        if (lastSpaceIndex === -1) return null;
        
        const book = coreRef.substring(0, lastSpaceIndex).trim(); 
        const chapVerse = coreRef.substring(lastSpaceIndex + 1).trim(); 
        const [chap, versePart] = chapVerse.split(':');
        if (!chap || !versePart) return null;
        
        let start = versePart;
        let end = versePart;
        
        if (versePart.includes('-')) {
            const parts = versePart.split('-');
            start = parts[0];
            end = parts[1];
        }
        
        return { book, chap, start, end };
    }

    function openExplanation() {
        const verseObj = gameVersesData[currentVerseIndex % gameVersesData.length];
        const params = getExplanationParams(verseObj.ref);
        
        if (params) {
            const url = `https://cokcok1.github.io/bible-ai2/index.html?book=${params.book}&chap=${params.chap}&start=${params.start}&end=${params.end}`;
            window.open(url, '_blank');
        } else {
            alert("無法開啟解釋：經文格式不支援");
        }
    }

    function resetRound() {
        shuffledSegments = shuffledSegments.concat(playerAnswer);
        playerAnswer = [];
        renderZones();
    }

    function renderZones() {
        const answerZone = document.getElementById('answerZone');
        const optionZone = document.getElementById('optionZone');
        const resetBtn = document.getElementById('resetBtn');
        const t = CONFIG[currentLang].ui;

        answerZone.innerHTML = '';
        optionZone.innerHTML = '';
        
        if (playerAnswer.length === 0) {
            answerZone.innerHTML = `<div class="answer-placeholder">${t.placeholder}</div>`;
            resetBtn.disabled = true;
        } else {
            resetBtn.disabled = false;
        }
        playerAnswer.forEach((text, index) => { answerZone.appendChild(createBrick(text, true, index)); });
        shuffledSegments.forEach((text, index) => { optionZone.appendChild(createBrick(text, false, index)); });
    }

    function createBrick(text, isAnswerZone, index) {
        let div = document.createElement('div');
        div.className = 'word-brick';
        div.innerText = text;
        div.onclick = function() {
            if (isAnswerZone) {
                const word = playerAnswer[index];
                playerAnswer.splice(index, 1);
                shuffledSegments.push(word);
            } else {
                const word = shuffledSegments[index];
                shuffledSegments.splice(index, 1);
                playerAnswer.push(word);
            }
            renderZones();
        };
        return div;
    }

    function checkAnswer() {
        const t = CONFIG[currentLang].ui;
        
        if (playerAnswer.length === 0) { showMessage(t.loadEmpty, "#ffb300"); return; }
        let isCorrect = true;
        if (playerAnswer.length !== currentSegments.length) isCorrect = false;
        else {
            for (let i = 0; i < currentSegments.length; i++) {
                if (playerAnswer[i] !== currentSegments[i]) { isCorrect = false; break; }
            }
        }
        
        const answerZone = document.getElementById('answerZone');
        const checkBtn = document.getElementById('checkBtn');
        const explainBtn = document.getElementById('explainBtn');
        
        if (isCorrect) {
            currentScore++;
            answerZone.classList.add('correct');
            showMessage(t.correctMsg, "var(--success-color)");
            hideCorrection();
            checkBtn.innerText = t.nextLevel;
            checkBtn.style.background = "var(--success-color)"; 
            checkBtn.onclick = nextLevel;
            
            explainBtn.disabled = false;
            
            // --- 修改：保護最遠進度 ---
            // 確保只有當前挑戰的題數大於或等於歷史最遠進度時，才更新保存進度
            if (!isRandomMode) {
                if (currentVerseIndex >= savedSeqIndex) {
                    savedSeqIndex = currentVerseIndex + 1; 
                }
            }
            saveProgress(); 
            // ------------------------
            
            triggerConfetti();
        } else {
            lives--;
            answerZone.classList.add('wrong');
            showMessage(t.wrongMsg, "#ef5350");
            updateUI();
            
            showCorrection(currentSegments.join(currentLang === 'en' ? ' ' : ''));
            
            checkBtn.innerText = t.nextQuestion;
            checkBtn.style.background = "#ef5350"; 
            checkBtn.onclick = nextLevel; 
            
            explainBtn.disabled = false;

            setTimeout(() => { answerZone.classList.remove('wrong'); }, 1000);
            
            if (lives <= 0) {
                showGameOverModal();
            }
        }
    }

    function nextLevel() { 
        currentVerseIndex++; 
        loadLevel(); 
        updateUI(); 
    }
    
    function showCorrection(text) { 
        document.getElementById('correctionText').innerText = text; 
        document.getElementById('correctionBox').style.display = 'block'; 
    }
    
    function hideCorrection() { document.getElementById('correctionBox').style.display = 'none'; }
    
    function showMessage(text, color) { 
        const msg = document.getElementById('message'); 
        msg.innerText = text; 
        msg.style.color = color || 'var(--text-color)'; 
    }
    
    function updateUI() {
        const t = CONFIG[currentLang].ui;
        let hearts = "";
        for(let i=0; i<lives; i++) hearts += "❤️";
        for(let i=lives; i<5; i++) hearts += "🤍"; 
        document.getElementById('livesDisplay').innerText = hearts;
        document.getElementById('scoreDisplay').innerText = t.scorePrefix + currentScore;
    }
    
    function shuffleArray(array) { for (let i = array.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [array[i], array[j]] = [array[j], array[i]]; } }
    
    function triggerConfetti() { confetti({ particleCount: 150, spread: 80, origin: { y: 0.6 }, colors: ['#64b5f6', '#4db6ac', '#fff176', '#ffb74d'] }); }
    
    function showGameOverModal() {
        const t = CONFIG[currentLang].ui;
        const title = t.gameOverTitle;
        const msg = t.gameOverMsg.replace('{score}', currentScore);
        
        document.getElementById('modalTitle').innerText = title;
        document.getElementById('modalText').innerHTML = msg;
        
        const actionsDiv = document.getElementById('modalActions');
        actionsDiv.innerHTML = ''; 

        if (isRandomMode) {
            const btn = document.createElement('button');
            btn.className = 'btn btn-submit';
            btn.innerText = t.restart;
            btn.onclick = handleRestartAll;
            actionsDiv.appendChild(btn);
        } else {
            const btnRestart = document.createElement('button');
            btnRestart.className = 'btn btn-reset';
            btnRestart.innerText = t.btnRestartAll;
            btnRestart.onclick = handleRestartAll;
            
            const btnContinue = document.createElement('button');
            btnContinue.className = 'btn btn-explain'; 
            btnContinue.innerText = t.btnContinue;
            btnContinue.onclick = handleContinue;
            
            actionsDiv.appendChild(btnRestart);
            actionsDiv.appendChild(btnContinue);
        }
        
        document.getElementById('gameModal').style.display = 'flex';
    }

    function handleRestartAll() {
        document.getElementById('gameModal').style.display = 'none';
        resetAllProgress(); 
        lives = 5;
        prepareGameData(); 
        initGame();
    }

    function handleContinue() {
        document.getElementById('gameModal').style.display = 'none';
        resetScoreOnly(); 
        lives = 5;
        // 如果想要 Game Over 後從「最新進度」繼續，而不是「剛剛失敗的那題」
        // currentVerseIndex = savedSeqIndex; // (可選)
        prepareGameData(); 
        initGame();
    }
    
    updateUIText();
    loadVersesFromFile();
</script>

</body>
